name: Auto Release

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true && (contains(github.event.pull_request.labels.*.name, 'patch') || contains(github.event.pull_request.labels.*.name, 'minor') || contains(github.event.pull_request.labels.*.name, 'major'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        id: bump
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate new version
        id: version
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
        run: |
          CURRENT=$(sed -n 's/^version\s*=\s*"\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/p' build.gradle.kts | head -1)

          if [ -z "$CURRENT" ]; then
            echo "::error::Could not extract current version from build.gradle.kts"
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW_VERSION ($BUMP_TYPE)"

      - name: Update version in build.gradle.kts
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          sed -i "s/version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" build.gradle.kts

      - name: Update CHANGELOG.md
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERSION: ${{ steps.version.outputs.new }}
        run: |
          DATE=$(date +%Y-%m-%d)
          ENTRY=$(printf '## [%s] - %s\n\n- %s (#%s)\n' "$VERSION" "$DATE" "$PR_TITLE" "$PR_NUMBER")
          # Insert new entry before the first existing ## [ section
          LINE=$(grep -n '^## \[' CHANGELOG.md | head -1 | cut -d: -f1)
          if [ -n "$LINE" ]; then
            head -n "$((LINE - 1))" CHANGELOG.md > CHANGELOG.tmp
            printf '%s\n\n' "$ENTRY" >> CHANGELOG.tmp
            tail -n "+$LINE" CHANGELOG.md >> CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            printf '\n%s\n' "$ENTRY" >> CHANGELOG.md
          fi

      - name: Commit, tag & push
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.gradle.kts CHANGELOG.md
          git commit -m "release: v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin master --tags

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Verify Plugin
        run: ./gradlew verifyPlugin

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.new }}
        run: gh release create "v$VERSION" build/distributions/*.zip --title "v$VERSION" --generate-notes
